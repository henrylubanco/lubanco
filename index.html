<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Acesso Seguro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <h2>Acesso Restrito</h2>
            <p class="subtitle">Insira suas credenciais para acessar o sistema.</p>
            
            <form id="login-form">
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" required placeholder="seu@email.com">
                </div>
                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                
                <div id="error-message" class="error-text hidden"></div>
                
                <button type="submit" id="login-btn" class="btn-primary">Entrar</button>
            </form>
            
            <p class="auth-footer">Sistema fechado. Solicite acesso ao administrador.</p>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
