<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Acesso Seguro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <h2>Criar Nova Conta</h2>
            <p class="subtitle">Preencha os dados para se registrar.</p>
            
            <form id="register-form">
                <div class="input-group">
                    <label for="reg-email">E-mail</label>
                    <input type="email" id="reg-email" required placeholder="seu@email.com">
                </div>
                <div class="input-group">
                    <label for="reg-password">Senha</label>
                    <input type="password" id="reg-password" required placeholder="Mínimo 6 caracteres" minlength="6">
                </div>
                
                <div id="reg-error-message" class="error-text hidden"></div>
                
                <button type="submit" id="register-btn" class="btn-primary">Cadastrar</button>
            </form>
            
            <p class="auth-footer">Já possui conta? <a href="index.html">Fazer Login</a></p>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
